# Ansible
ansible_python_interpreter: "auto_silent"

# ASDF
asdf_path: "{{ home }}/.asdf"
asdf_version: "v0.11.3"

# Git
git_email: "rezendepauloeduardo@outlook.com"
git_gpg: "671C1CC571E4323E"
git_name: "Paulo Eduardo Rezende"

# General Variables
home: "{{ lookup('env','HOME') }}"
user: "{{ lookup('env','USER') }}"

# Visual Studio Code
visual_studio_code_build: "stable"
visual_studio_code_mirror: "https://packages.microsoft.com"
visual_studio_code_package: "{{ (visual_studio_code_build == 'insiders') | ternary('code-insiders', 'code') }}"
visual_studio_code_version: ""
visual_studio_code_extensions:
  - adpyke.codesnap
  - dbaeumer.vscode-eslint
  - dsznajder.es7-react-js-snippets
  - eamodio.gitlens
  - editorconfig.editorconfig
  - equinusocio.vsc-material-theme
  - equinusocio.vsc-material-theme-icons
  - esbenp.prettier-vscode
  - github.copilot
  - github.copilot-chat
  - github.vscode-pull-request-github
  - ibm.output-colorizer
  - irongeek.vscode-env
  - miguelsolorio.fluent-icons
  - nicoespeon.abracadabra
  - redhat.vscode-yaml
  - tyriar.sort-lines
  - visualstudioexptteam.intellicode-api-usage-examples
  - visualstudioexptteam.vscodeintellicode
