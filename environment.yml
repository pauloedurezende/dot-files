---
- name: Configure development environment
  hosts: environment
  roles:
    - role: asdf
    - role: git
    - role: kitty

    - role: fzf
      plugins:
        - name: "fzf"
          versions: ["0.28.0", "0.29.0"]
          global: "0.29.0"

    - role: node
      plugins:
        - name: "nodejs"
          versions: ["14.19.0", "16.14.0"]
          global: "16.14.0"

        - name: "yarn"
          versions: ["1.22.17"]
          global: "1.22.17"

        - name: "github-cli"
          versions: ["2.5.1"]
          global: "2.5.1"

        - name: "pnpm"
          versions: ["6.31.0"]
          global: "6.31.0"

    - role: tmux
      plugins:
        - name: "tmux"
          versions: ["3.2a"]
          global: "3.2a"
