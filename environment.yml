---
- name: Configure development environment
  hosts: environment
  roles:
    - role: dconf
      when: ansible_os_family == "Debian"
    
    - role: asdf
      where: ansible_os_family == "Debian"

    - role: fonts
    - role: git
    
    - role: fzf
    - role: node
    - role: tmux
      plugins:
        - name: "tmux"
          versions: ["3.2a"]
          global: "3.2a"

    - role: neovim
    - role: vscode
    - role: zsh
    - role: docker
