---
- name: Install dependencies
  apt:
    name:
      - unzip
      - git
      - curl
      - autoconf
      - automake
      - gcc
      - g++
      - make
      - patch
      - pkg-config
      - binutils
      - libtool
      - bison
      - libreadline-dev
    install_recommends: no
    cache_valid_time: 86400
  become: true
  retries: 5
  register: dependencies_result
  until: dependencies_result is succeeded
