---
- name: install
  shell:
    cmd: asdf install "{{ item.0.name }}" "{{ item.1 }}"\
    executable: /usr/bin/bash
  args:
    creates: "{{ asdf_path }}/installs/{{ item.0.name }}/{{ item.1 }}"
    chdir: "{{ asdf_path }}"
  with_subelements:
    - "{{ plugins }}"
    - versions
    - flags:
      skip_missing: true
  when: plugins | length > 0
