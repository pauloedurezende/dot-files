---
- name: add
  shell:
    cmd: asdf plugin add "{{ item.name }}" "{{ item.repository | default() }}"
    executable: /usr/bin/bash
  args:
    creates: "{{ asdf_path }}/plugins/{{ item.name }}"
    chdir: "{{ asdf_path }}"
  with_items: "{{ plugins }}"
  when: plugins | length > 0
  ignore_errors: true
