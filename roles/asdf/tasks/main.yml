---
- name: Download
  git:
    repo: "https://github.com/asdf-vm/asdf.git"
    dest: "{{ home }}/.asdf"
    version: "{{ asdf.version }}"
    force: true

- name: Install
  when: asdf.shell == "bash"
  blockinfile:
    path: "{{ home }}/.bashrc"
    marker: "\n# {mark} :: ANSIBLE MANAGED BLOCK :: {{ role_name }}"
    block: |
      . ~/.asdf/asdf.sh
      . ~/.asdf/completions/asdf.bash

- name: Source
  shell: source ~/.bashrc
