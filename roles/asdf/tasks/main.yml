---
- name: Install
  git:
    repo: "https://github.com/asdf-vm/asdf.git"
    dest: "{{ home }}/.asdf"
    version: "{{ asdf.version }}"
    force: true

- name: Source asdf
  when: asdf.shell == "bash"
  blockinfile:
    path: ~/.bashrc
    marker: "# {mark} :: ANSIBLE MANAGED BLOCK :: {{ role_name }}"
    block: |
      . ~/.asdf/asdf.sh
      . ~/.asdf/completions/asdf.bash
