---
- import_tasks: darwin.yml
  when: ansible_os_family == "Darwin"

- name: Adding plugins
  shell: >-
    {{ asdf_run }} &&
    asdf plugin add {{ item.name }}
  args:
    executable: "{{ asdf_shell }}"
    creates: "{{ asdf_path }}/plugins/{{ item.name }}"
    chdir: "{{ asdf_path }}"
  with_items:
    - { name: nodejs }
    - { name: yarn }
    - { name: github-cli }
  ignore_errors: True

- name: Installing plugins
  shell: >-
    {{ asdf_run }} &&
    asdf install {{ item.name }} {{ item.version }}
  args:
    executable: "{{ asdf_shell }}"
    creates: "{{ asdf_path }}/installs/{{ item.name }}/{{ item.version }}"
    chdir: "{{ asdf_path }}"
  with_items:
    - { name: nodejs, version: 14.18.0 }
    - { name: yarn, version: 1.22.15 }
    - { name: github-cli, version: 2.0.0 }

- name: Setting plugins as global
  shell: >-
    {{ asdf_run }} &&
    asdf global {{ item.name }} {{ item.version }}
  args:
    executable: "{{ asdf_shell }}"
    chdir: "{{ asdf_path }}"
  with_items:
    - { name: nodejs, version: 14.18.0 }
    - { name: yarn, version: 1.22.15 }
    - { name: github-cli, version: 2.0.0 }
