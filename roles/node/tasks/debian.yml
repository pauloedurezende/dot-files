---
- name: define variables
  set_fact:
    plugins:
      - name: "nodejs"
        versions: ["lts-gallium", "lts-hydrogen"]
        global: "lts-hydrogen"

      - name: "yarn"
        versions: ["1.22.19"]
        global: "1.22.19"

      - name: "github-cli"
        versions: ["2.28.0"]
        global: "2.28.0"

      - name: "pnpm"
        versions: ["8.4.0"]
        global: "8.4.0"

- import_role:
    name: asdf
    tasks_from: add
  vars:
    plugins: "{{ plugins }}"

- import_role:
    name: asdf
    tasks_from: install
  vars:
    plugins: "{{ plugins }}"

- import_role:
    name: asdf
    tasks_from: global
  vars:
    plugins: "{{ plugins }}"
