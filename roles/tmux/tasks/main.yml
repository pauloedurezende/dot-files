---
- name: Add plugins
  command: "asdf plugin add {{ item.name }}"
  with_items:
    - { name: tmux }
  register: output
  failed_when: output.rc == 1

- name: Install plugins
  command: "asdf install {{ item.name }} {{ item.version }}"
  with_items:
    - { name: tmux, version: 3.2a }

- name: Setting plugins as global
  command: "asdf global {{ item.name }} {{ item.version }}"
  with_items:
    - { name: tmux, version: 3.2a }

- name: Install tpm
  git:
    repo: "https://github.com/tmux-plugins/tpm.git"
    dest: "{{ home }}/.tmux/plugins/tpm"

- name: Checking if there is any existing configuration
  stat:
    path: "{{ home }}/.tmux.conf"
  register: tmux

- name: Backing up if there is already a configuration
  command: "mv {{ home }}/.tmux.conf {{ home }}/.tmux-{{ ansible_date_time.iso8601 }}"
  when: tmux.stat.exists

- name: Adding settings
  copy:
    src: "{{ role_path }}/files/{{ item.file }}"
    dest: "{{ home }}/.{{ item.file }}"
  loop:
    - { file: "tmux.conf" }
