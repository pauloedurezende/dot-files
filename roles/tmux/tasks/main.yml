---
- import_tasks: "{{ playbook_dir }}/roles/asdf/tasks/add.yml"
  vars:
    plugins: "{{ plugins }}"

- import_tasks: "{{ playbook_dir }}/roles/asdf/tasks/install.yml"
  vars:
    plugins: "{{ plugins }}"

- import_tasks: "{{ playbook_dir }}/roles/asdf/tasks/global.yml"
  vars:
    plugins: "{{ plugins }}"

- name: Install TPM
  git:
    repo: "https://github.com/tmux-plugins/tpm.git"
    dest: "{{ home }}/.tmux/plugins/tpm"

- name: Update current settings
  copy:
    src: "{{ role_path }}/files/tmux.conf"
    dest: "{{ home }}/.tmux.conf"
    backup: true
