---
- name: Adding plugin
  shell: >-
    {{ asdf.run }} &&
    asdf plugin add {{ item.name }}
  args:
    executable: "{{ asdf.shell }}"
    creates: "{{ asdf.path }}/plugins/{{ item.name }}"
    chdir: "{{ asdf.path }}"
  with_items:
    - { name: tmux }
  ignore_errors: True

- name: Installing plugin
  shell: >-
    {{ asdf.run }} &&
    asdf install {{ item.name }} {{ item.version }}
  args:
    executable: "{{ asdf.shell }}"
    creates: "{{ asdf.path }}/installs/{{ item.name }}/{{ item.version }}"
    chdir: "{{ asdf.path }}"
  with_items:
    - { name: tmux, version: 3.2a }

- name: Setting plugin as global
  shell: >-
    {{ asdf.run }} &&
    asdf global {{ item.name }} {{ item.version }}
  args:
    executable: "{{ asdf.shell }}"
    chdir: "{{ asdf.path }}"
  with_items:
    - { name: tmux, version: 3.2a }

- name: Install tpm
  git:
    repo: "https://github.com/tmux-plugins/tpm.git"
    dest: "{{ home }}/.tmux/plugins/tpm"
    force: true

- name: Checking if there is any existing configuration
  stat:
    path: "{{ home }}/.tmux.conf"
  register: config

- name: Backing up if there is already a configuration
  command: "mv {{ home }}/.tmux.conf {{ home }}/.tmux-{{ ansible_date_time.iso8601 }}"
  when: config.stat.exists

- name: Adding settings
  copy:
    src: "{{ role_path }}/files/{{ item.file }}"
    dest: "{{ home }}/.{{ item.file }}"
  loop:
    - { file: "tmux.conf" }
