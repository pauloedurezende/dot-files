---
- name: Add diff-so-fancy repository
  apt_repository:
    repo: ppa:aos1/diff-so-fancy
    codename: focal
    update_cache: true
  become: true
  become_user: root
  become_method: sudo

- name: Install dependencies
  apt:
    name:
      - git
      - diff-so-fancy
    state: latest
  become: true
  become_user: root
  become_method: sudo
