- import_tasks: pop_os.yml
  when: ansible_os_family == "Pop!_OS"

- name: Checking if there is any existing configuration
  stat: 
    path: "{{ home }}/.gitconfig"
  register: gitignore

- name: Backing up
  command: "mv {{ home }}/.gitconfig {{ home }}/.gitconfig.bak"
  when: gitignore.stat.exists

- name: Adding settings
  template:
    src: "gitconfig.j2"
    dest: "{{ home }}/.gitconfig"
