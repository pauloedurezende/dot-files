---
- name: Add
  command: "bash -lc 'asdf plugin add {{ item.name }} {{ item.repository | default() }}'"
  args:
    creates: "{{ asdf_path }}/plugins/{{ item.name }}"
    chdir: "{{ asdf_path }}"
  with_items: "{{ plugins }}"
  when: plugins | length > 0
  ignore_errors: true

- name: Install
  command: "bash -lc 'asdf install {{ item.0.name }} {{ item.1 }}'"
  args:
    creates: "{{ asdf_path }}/installs/{{ item.0.name }}/{{ item.1 }}"
    chdir: "{{ asdf_path }}"
  with_subelements:
    - "{{ plugins }}"
    - versions
    - flags:
      skip_missing: true
  when: plugins | length > 0

- name: Set global
  command: "bash -lc 'asdf global {{ item.name }} {{ item.global | default(item.versions | difference(item.delete_versions|default([])) | sort | first) }}'"
  args:
    chdir: "{{ asdf_path }}"
  when: item.versions is defined
  with_items: "{{ plugins }}"

- name: Create root folder if not exists
  file:
    path: "{{ home }}/.config/nvim"
    state: directory

- name: Update current settings
  copy:
    src: "{{ role_path }}/files/{{ item.file }}"
    dest: "{{ home }}/.config/nvim/{{ item.file }}"
    backup: true
  loop:
    - { file: "init.vim" }
    - { file: "coc-settings.json" }
