---
- import_tasks: "{{ playbook_dir }}/roles/asdf/tasks/add.yml"
  vars:
    plugins: "{{ plugins }}"

- import_tasks: "{{ playbook_dir }}/roles/asdf/tasks/install.yml"
  vars:
    plugins: "{{ plugins }}"

- import_tasks: "{{ playbook_dir }}/roles/asdf/tasks/global.yml"
  vars:
    plugins: "{{ plugins }}"

- name: Create root folder if not exists
  file:
    path: "{{ home }}/.config/nvim"
    state: directory

- name: Update current settings
  copy:
    src: "{{ role_path }}/files/{{ item.file }}"
    dest: "{{ home }}/.config/nvim/{{ item.file }}"
    backup: true
  loop:
    - { file: "init.vim" }
    - { file: "coc-settings.json" }
