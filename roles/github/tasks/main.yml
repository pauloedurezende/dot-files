- name: Add plugins
  command: "asdf plugin add {{ item.name }}"
  with_items:
    - { name: github-cli }

- name: Install plugins
  command: "asdf install {{ item.name }} {{ item.version }}"
  with_items:
    - { name: github-cli, version: latest }

- name: Setting plugins as global
  command: "asdf global {{ item.name }} {{ item.version }}"
  with_items:
    - { name: github-cli, version: latest }
