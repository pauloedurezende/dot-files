---
- name: Install dependencies
  homebrew:
    name: 
      - zsh
      - sheldon
    state: latest

- name: Update current settings
  copy:
    src: "{{ role_path }}/files/{{ item.file }}"
    dest: "{{ item.path }}/{{ item.file }}"
    backup: true
  loop:
    - { file: "zshrc", path: "{{ home }}/" }
    - { file: "plugins.toml", path: "{{ home }}/.sheldon/" }

- name: Set zsh as default shell
  become: true
  shell: "bash -lc 'chsh -s $(which zsh)'"
