---
- import_tasks: debian.yml
  when: ansible_os_family == "Debian"

- import_tasks: darwin.yml
  when: ansible_os_family == "Darwin"

- name: Update current settings
  template:
    src: "zshrc.j2"
    dest: "{{ home }}/.zshrc"
    backup: yes

- name: Set zsh as default shell
  become: true
  command: "bash -lc 'chsh -s $(which zsh)'"
