- import_tasks: pop_os.yml
  when: ansible_os_family == "Pop!_OS"

- name: Install zplug
  git:
    repo: "git@github.com:zplug/zplug.git"
    dest: "{{ home }}/.zplug"

- name: Checking if there is any existing configuration
  stat: 
    path: "{{ home }}/.zshrc"
  register: zsh

- name: Backing up
  command: "mv {{ home }}/.zshrc {{ home }}/.zshrc.bak"
  when: zsh.stat.exists

- name: Adding settings
  template:
    src: "zshrc.j2"
    dest: "{{ home }}/.zshrc"

- name: Setting zsh as default shell
  command: chsh -s /usr/bin/zsh
  become: yes
  become_user: root
  become_method: sudo
