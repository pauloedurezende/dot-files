---
- name: Install dependencies
  become: true
  apt:
    name: zsh
    state: latest

- name: Install sheldon
  shell: curl --proto '=https' -fLsS https://rossmacarthur.github.io/install/crate.sh | bash -s -- --repo rossmacarthur/sheldon --to ~/.local/bin
  args:
    warn: false
  ignore_errors: true

- name: Create root folder if not exists
  file:
    path: "{{ home }}/.config/sheldon"
    state: directory

- name: Update current settings
  copy:
    src: "{{ role_path }}/files/{{ item.file }}"
    dest: "{{ item.path }}/{{ item.file }}"
    backup: true
  loop:
    - { file: ".zshrc", path: "{{ home }}/" }
    - { file: "plugins.toml", path: "{{ home }}/.config/sheldon/" }
